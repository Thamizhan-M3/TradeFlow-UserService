name: User Service CI

on:
  push:
    branches:
      - 'feature/**'
      - dev
      - qa
      - master

  pull_request:
    branches:
      - dev
      - qa
      - master

permissions:
  contents: write

jobs:
  user-ci:
    name: User Pipeline

    uses: Thamizhan-M3/TradeFlow-CommonTemplate/.github/workflows/_ci_template.yaml@master

    with:
      working_directory: .
      image_name: tradeflow-user
      service_name: tradeflow-user
      run_build: false
      sonar_project_key: tradeflow-user
      docker_context: .
      dockerfile_path: ./Dockerfile

    secrets:
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
      SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
      DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
      DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}